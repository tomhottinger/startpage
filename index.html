<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">

    <title>Startpage</title>
</head>

<body class="text-center">

    <main role="main" class="container">
        <h1 class="welcomeText">TEXT</h1>

        <form id="search-form" action="https://www.google.com/search" method="get">
            <input id="search-bar" class="form-control" type="text" autofocus type="text" placeholder="Search Google"
                name="q" alt="Search Google" onkeydown="if(event.keyCode === 13) { this.form.submit(); return false; }">
        </form>

        <div id="tileGrid" class="tile-grid mt-4">
            <a id="tileEntry" class="card tile-card" href="#" target="_self">
                <div class="card-body">
                    <div class="tile-icon-wrap">
                        <i class="tileIcon"></i>
                    </div>
                    <div class="tile-text">
                        <h5 class="tileTitle">TITLE</h5>
                        <p class="tileMeta mb-0">META</p>
                    </div>
                </div>
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>

</html>
